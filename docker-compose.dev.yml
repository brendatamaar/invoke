services:
  executor:
    image: golang:1.23
    working_dir: /workspace/executor
    command: go run ./cmd/executor
    environment:
      EXECUTOR_ADDR: ":50051"
    volumes:
      - .:/workspace
    ports:
      - "50051:50051"

  server:
    image: node:20
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @invoke/server dev"
    environment:
      EXECUTOR_GRPC_ADDR: executor:50051
      PORT: 4000
    volumes:
      - .:/workspace
    ports:
      - "4000:4000"
    depends_on:
      - executor

  ui:
    image: node:20
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @invoke/ui dev"
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - server
