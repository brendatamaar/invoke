syntax = "proto3";

package invoke.executor;

option go_package = "github.com/brendatama/invoke/executor/internal/executorpb";

service HttpExecutor {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Execute(HttpRequest) returns (HttpResponse);
  rpc ExecuteStream(HttpRequest) returns (stream ResponseChunk);
  rpc WebSocketConnect(WebSocketConnectRequest) returns (WebSocketConnectResponse);
  rpc WebSocketSend(WebSocketSendRequest) returns (WebSocketSendResponse);
  rpc WebSocketPoll(WebSocketPollRequest) returns (WebSocketPollResponse);
  rpc WebSocketClose(WebSocketCloseRequest) returns (WebSocketCloseResponse);
  rpc GrpcReflect(GrpcReflectRequest) returns (GrpcReflectResponse);
  rpc GrpcExecute(GrpcExecuteRequest) returns (GrpcExecuteResponse);
  rpc GrpcServerStream(GrpcExecuteRequest) returns (stream GrpcStreamMessage);
  rpc GrpcStreamOpen(GrpcExecuteRequest) returns (GrpcStreamOpenResponse);
  rpc GrpcStreamSend(GrpcStreamSendRequest) returns (GrpcStreamSendResponse);
  rpc GrpcStreamClose(GrpcStreamCloseRequest) returns (GrpcStreamCloseResponse);
  rpc GrpcStreamPoll(GrpcStreamPollRequest) returns (GrpcStreamPollResponse);
}

message PingRequest {}

message PingResponse {
  string message = 1;
  string version = 2;
  int64 uptime_ms = 3;
}

message Header {
  string key = 1;
  string value = 2;
}

message ProxyConfig {
  string type = 1;
  string url = 2;
  string username = 3;
  string password = 4;
}

message TlsClientConfig {
  bytes client_cert_pem = 1;
  bytes client_key_pem = 2;
  bytes ca_cert_pem = 3;
  string server_name = 4;
}

message HttpRequest {
  string method = 1;
  string url = 2;
  repeated Header headers = 3;
  bytes body = 4;
  int64 timeout_ms = 5;
  bool follow_redirects = 6;
  int32 max_redirects = 7;
  bool verify_ssl = 8;
  ProxyConfig proxy = 9;
  TlsClientConfig tls_client_config = 10;
}

message Timing {
  double dns_ms = 1;
  double tcp_ms = 2;
  double tls_ms = 3;
  double ttfb_ms = 4;
  double transfer_ms = 5;
  double total_ms = 6;
}

message TimingPhase {
  string name = 1;
  double start_ms = 2;
  double duration_ms = 3;
}

message Certificate {
  string subject = 1;
  string issuer = 2;
  string not_before = 3;
  string not_after = 4;
  repeated string dns_names = 5;
  string serial_number = 6;
  string sha256_fingerprint = 7;
}

message TlsInfo {
  string version = 1;
  string cipher_suite = 2;
  repeated Certificate certificates = 3;
}

message Redirect {
  string url = 1;
  int32 status = 2;
  repeated Header headers = 3;
  Timing timing = 4;
  repeated TimingPhase phases = 5;
}

message TimingAttempt {
  string url = 1;
  int32 status = 2;
  repeated Header headers = 3;
  Timing timing = 4;
  repeated TimingPhase phases = 5;
  bool redirect = 6;
}

message HttpResponse {
  int32 status = 1;
  string status_text = 2;
  repeated Header headers = 3;
  bytes body = 4;
  Timing timing = 5;
  TlsInfo tls = 6;
  repeated Redirect redirects = 7;
  int64 request_size = 8;
  int64 response_size = 9;
  string error = 10;
  repeated TimingAttempt attempts = 11;
}

message ResponseChunk {
  bytes body = 1;
  HttpResponse final_response = 2;
  bool done = 3;
  string error = 4;
}

message WebSocketConnectRequest {
  string url = 1;
  repeated Header headers = 2;
  repeated string protocols = 3;
  int64 timeout_ms = 4;
  bool verify_ssl = 5;
  TlsClientConfig tls_client_config = 6;
}

message WebSocketConnectResponse {
  string connection_id = 1;
  string error = 2;
}

message WebSocketSendRequest {
  string connection_id = 1;
  string body = 2;
  bool binary = 3;
}

message WebSocketSendResponse {
  string error = 1;
}

message WebSocketPollRequest {
  string connection_id = 1;
  int32 max_messages = 2;
}

message WebSocketMessage {
  string direction = 1;
  string type = 2;
  string body = 3;
  int64 created_at = 4;
}

message WebSocketPollResponse {
  repeated WebSocketMessage messages = 1;
  bool connected = 2;
  string error = 3;
}

message WebSocketCloseRequest {
  string connection_id = 1;
}

message WebSocketCloseResponse {
  string error = 1;
}

message GrpcReflectRequest {
  string address = 1;
  bool tls = 2;
  int64 timeout_ms = 3;
  repeated Header metadata = 4;
  bool verify_ssl = 5;
  TlsClientConfig tls_client_config = 6;
  string protoset_base64 = 7;
}

message GrpcMethod {
  string service = 1;
  string method = 2;
  string full_method = 3;
  string input_type = 4;
  string output_type = 5;
  string input_json = 6;
  bool client_streaming = 7;
  bool server_streaming = 8;
}

message GrpcReflectResponse {
  repeated GrpcMethod methods = 1;
  string error = 2;
}

message GrpcExecuteRequest {
  string address = 1;
  bool tls = 2;
  string full_method = 3;
  string body_json = 4;
  int64 timeout_ms = 5;
  repeated Header metadata = 6;
  bool verify_ssl = 7;
  TlsClientConfig tls_client_config = 8;
  string protoset_base64 = 9;
  string compression = 10;
}

message GrpcExecuteResponse {
  string body_json = 1;
  repeated Header metadata = 2;
  repeated Header trailers = 3;
  int32 status_code = 4;
  string status_message = 5;
  double duration_ms = 6;
  string error = 7;
  string status_details_json = 8;
}

message GrpcStreamMessage {
  string body_json = 1;
  bool done = 2;
  string error = 3;
  repeated Header trailers = 4;
  int32 status_code = 5;
  string status_message = 6;
  double duration_ms = 7;
  repeated Header initial_metadata = 8;
  string status_details_json = 9;
}

message GrpcStreamOpenResponse {
  string stream_id = 1;
  string error = 2;
}

message GrpcStreamSendRequest {
  string stream_id = 1;
  string body_json = 2;
}

message GrpcStreamSendResponse {
  string error = 1;
}

message GrpcStreamCloseRequest {
  string stream_id = 1;
}

message GrpcStreamCloseResponse {
  string body_json = 1;
  repeated Header metadata = 2;
  repeated Header trailers = 3;
  int32 status_code = 4;
  string status_message = 5;
  double duration_ms = 6;
  string error = 7;
  string status_details_json = 8;
}

message GrpcStreamPollRequest {
  string stream_id = 1;
  int32 max_messages = 2;
}

message GrpcStreamPollResponse {
  repeated GrpcStreamMessage messages = 1;
  bool connected = 2;
  string error = 3;
}
