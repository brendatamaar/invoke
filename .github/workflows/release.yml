name: Release
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  OWNER: brendatamaar

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Build & push UI
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/invoke-ui:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/invoke-ui:latest

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/invoke-server:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/invoke-server:latest

      - name: Build & push executor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.executor
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/invoke-executor:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/invoke-executor:latest

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true