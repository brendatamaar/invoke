services:
  executor:
    image: ghcr.io/brendatamaar/invoke-executor:latest
    environment:
      ALLOW_PRIVATE_ADDRESSES: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 50051"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/brendatamaar/invoke-server:latest
    environment:
      EXECUTOR_GRPC_ADDR: executor:50051
      PORT: 4000
    depends_on:
      executor:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  ui:
    image: ghcr.io/brendatamaar/invoke-ui:latest
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
